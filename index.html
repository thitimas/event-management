<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSTEP / STEP Attendance Scanner</title>
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>
  <div class="container">
    <header>
      <h1>CSTEP / STEP Attendance Scanner</h1>
    </header>

    <main>

      <!-- ── SETUP PANEL (shown first) ── -->
      <div id="setupPanel">
        <p class="setup-intro">Choose today's event and session to begin.</p>

        <!-- Eventbrite Event -->
        <div class="form-group">
          <label for="eventSelect">Event</label>
          <div class="select-refresh-row">
            <select id="eventSelect" disabled onchange="onEventChange()">
              <option value="">Loading today's events...</option>
            </select>
            <button type="button" class="btn-small" onclick="loadEventsToday()">Refresh</button>
          </div>
          <p id="eventListStatus" class="form-help">Loading today's Eventbrite events...</p>
        </div>

        <!-- Agenda Session -->
        <div class="form-group">
          <label for="sessionSelect">Session</label>
          <select id="sessionSelect" disabled>
            <option value="">— Select an event first —</option>
          </select>
          <p id="sessionStatus" class="form-help"></p>
        </div>

        <!-- Activity Type (CSTEP / STEP service category) -->
        <div class="form-group">
          <label for="activityTypeSelect">Activity / Service Type</label>
          <select id="activityTypeSelect">
            <option value="">— Select activity type —</option>
            <option value="supplemental_financial_assistance">Supplemental Financial Assistance (book award, conference travel, stipend, etc.)</option>
            <option value="summer_program">Summer Program</option>
            <option value="tutoring_supplemental_instruction">Tutoring / Supplemental Instruction</option>
            <option value="supplemental_academic_advisement">Supplemental Academic Advisement</option>
            <option value="academic_enrichment_workshop">Academic Enrichment / Workshop</option>
            <option value="career_planning_workshop">Career Planning / Workshop</option>
            <option value="graduate_admissions_license_exam_prep">Graduate Admissions / License Exam Prep</option>
          </select>
        </div>

        <!-- Test Mode -->
        <div class="form-group test-mode-row">
          <label class="toggle-label">
            <input type="checkbox" id="testModeToggle" onchange="onTestModeToggle()" />
            <span class="toggle-text">Test mode <span class="toggle-hint">(scan real QR — no data sent to n8n)</span></span>
          </label>
          <div id="testModeIndicator" class="test-mode-indicator hidden">🧪 Test mode active — no real data is being sent</div>
        </div>

        <div id="setupError" class="status-message error hidden"></div>
        <button class="btn btn-primary" onclick="confirmSetup()">Confirm &amp; Start Scanning</button>
      </div>

      <!-- ── SCANNER PANEL (shown after setup) ── -->
      <div id="scannerPanel" class="hidden">

        <!-- Active session summary -->
        <div class="session-summary">
          <div class="session-row">
            <span class="session-label">Event:</span>
            <span id="summaryEvent"></span>
          </div>
          <div class="session-row">
            <span class="session-label">Session:</span>
            <span id="summarySession"></span>
          </div>
          <div class="session-row">
            <span class="session-label">Type:</span>
            <span id="summaryActivityType"></span>
          </div>
        </div>

        <!-- Switch to a different event / session -->
        <button class="btn btn-change" onclick="resetSetup()">Change Event / Session</button>

        <!-- Scanner Controls -->
        <div class="scanner-controls">
          <button id="startBtn" class="btn btn-primary" onclick="startScanner()">Start Scanner</button>
          <button id="stopBtn" class="btn btn-secondary" onclick="stopScanner()" disabled>Stop Scanner</button>
        </div>

        <!-- Camera / QR Area -->
        <div id="scannerWrapper" class="scanner-wrapper hidden">
          <div id="qr-reader"></div>
          <p class="scanner-hint">Point the camera at a student QR code</p>
        </div>

        <!-- Status / Result Area -->
        <div id="statusArea" class="status-area hidden">
          <div id="statusMessage" class="status-message"></div>
        </div>

        <!-- Last Scan Info -->
        <div id="lastScan" class="last-scan hidden">
          <h3>Last Scan</h3>
          <div id="lastScanDetails"></div>
        </div>

      </div>

    </main>

    <footer>
      <p>CSTEP / STEP Attendance System &mdash; Scanner Page</p>
    </footer>
  </div>

  <!-- html5-qrcode library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="script.js?v=9"></script>
</body>
</html>
