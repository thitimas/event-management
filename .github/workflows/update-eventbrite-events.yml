name: Update Eventbrite Events

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch today's Eventbrite events
        env:
          EVENTBRITE_API_TOKEN: ${{ secrets.EVENTBRITE_API_TOKEN }}
          EVENTBRITE_ORGANIZER_ID: ${{ vars.EVENTBRITE_ORGANIZER_ID }}
          EVENT_TIME_ZONE: America/New_York
        run: node scripts/fetch-eventbrite-events.js

      - name: Commit generated event list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # events-today.json is gitignored, so force-add it, then commit only
          # when the staged content actually changed (also handles the first run).
          git add -f events-today.json
          if git diff --cached --quiet -- events-today.json; then
            echo "events-today.json is already current."
            exit 0
          fi

          git commit -m "Update Eventbrite events for today"
          git push
